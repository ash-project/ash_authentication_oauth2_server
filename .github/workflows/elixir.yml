name: CI
on:
  push:
    tags:
      - "v*"
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
jobs:
  ash-ci:
    uses: ash-project/ash/.github/workflows/ash-ci.yml@main
    with:
      reuse: true
      # No DSLs in this package, so the Spark formatter & cheat-sheet
      # checks have nothing to do.
      spark-formatter: false
      spark-cheat-sheets: false
    secrets:
      HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
